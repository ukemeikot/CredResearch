name: credresearch

# Phase-0 stack: the two application deployables (backend + ai-worker) and the
# datastores they need to boot. Web / MinIO / Gotenberg / MailHog are added in
# later phases (see docs/DEPLOYMENT_AND_INFRASTRUCTURE.md).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: credresearch
      POSTGRES_USER: credresearch
      POSTGRES_PASSWORD: devpass
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credresearch -d credresearch"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  ai-worker:
    build: ../services/ai-worker
    environment:
      DATABASE_URL: postgresql://credresearch:devpass@postgres:5432/credresearch
      REDIS_URL: redis://redis:6379/0
      INTERNAL_SERVICE_SECRET: change-me-dev-secret
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ../services/backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/credresearch
      SPRING_DATASOURCE_USERNAME: credresearch
      SPRING_DATASOURCE_PASSWORD: devpass
      REDIS_URL: redis://redis:6379/0
      INTERNAL_SERVICE_SECRET: change-me-dev-secret
      AI_WORKER_URL: http://ai-worker:8001
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      ai-worker: { condition: service_started }
    # Host 8080 is often taken (IDE/Node dev servers); publish on 18080 instead.
    ports: ["18080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24

volumes:
  pgdata: {}
