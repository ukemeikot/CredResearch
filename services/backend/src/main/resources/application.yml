server:
  port: 8080

spring:
  application:
    name: credresearch-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/credresearch}
    username: ${SPRING_DATASOURCE_USERNAME:credresearch}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
  jpa:
    hibernate:
      ddl-auto: none   # Flyway owns the schema; Hibernate never alters or validates it
    open-in-view: false
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}
  mail:
    host: ${EMAIL_HOST:localhost}
    port: ${EMAIL_PORT:1025}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${EMAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${EMAIL_SMTP_STARTTLS:false}

credresearch:
  auth:
    # RS256 PEM keys. If blank, an ephemeral dev keypair is generated at startup (NOT for prod).
    jwt-private-key: ${JWT_PRIVATE_KEY:}
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    email-token-ttl: PT24H
    issuer: credresearch
  email:
    from: ${EMAIL_FROM:no-reply@credresearch.local}
  throttle:
    login-max-attempts: 5
    login-window: PT15M
  app:
    base-url: ${APP_BASE_URL:http://localhost:3000}
  cors:
    # Comma-separated list of allowed browser origins for the SPA.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized   # anonymous sees only {status}; details require auth
