name: deploy-gcp

# Branch → environment:
#   push to `staging` → deploys the STAGING GCP env
#   push to `main`    → deploys the PRODUCTION GCP env
# Auth is keyless via Workload Identity Federation (no stored key).
# Gated behind the GCP_DEPLOY_ENABLED repo variable.
on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "staging | production"
        default: staging

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.GCP_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      PROJECT: xental-501115
      REGION: europe-west1
      ZONE: europe-west1-b
      REGISTRY: europe-west1-docker.pkg.dev/xental-501115/credresearch
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/907872692877/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: ci-deployer@xental-501115.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build & push images (tag = git SHA + latest)
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          for svc in backend ai-worker web; do
            ctx="services/$svc"; [ "$svc" = "web" ] && ctx="apps/web"
            docker build -t "$REGISTRY/$svc:$SHA" -t "$REGISTRY/$svc:latest" "$ctx"
            docker push "$REGISTRY/$svc:$SHA"
            docker push "$REGISTRY/$svc:latest"
          done

      - name: Roll ${{ env.ENVIRONMENT }} onto the new image
        run: |
          set -euo pipefail
          # web + backend are Managed Instance Groups → rolling replace (surge 1, 0 unavailable)
          # spins up a fresh VM that pulls :latest before the old one is drained.
          for svc in web backend; do
            gcloud compute instance-groups managed rolling-action replace \
              "credresearch-${ENVIRONMENT}-${svc}-mig" \
              --zone "$ZONE" --project "$PROJECT" \
              --max-surge 1 --max-unavailable 0
          done
          # ai-worker is a single instance (stable internal IP) → reset re-runs the
          # startup script, which re-pulls :latest.
          gcloud compute instances reset "credresearch-${ENVIRONMENT}-ai-worker" \
            --zone "$ZONE" --project "$PROJECT"

      - name: Wait for MIGs to stabilize (fail the deploy if the new VM is unhealthy)
        run: |
          set -euo pipefail
          # rolling-action replace returns immediately; without this a crash-looping new VM
          # (e.g. a failed DB migration) would leave the deploy "green" while the old image serves.
          for svc in web backend; do
            gcloud compute instance-groups managed wait-until \
              "credresearch-${ENVIRONMENT}-${svc}-mig" \
              --stable --zone "$ZONE" --project "$PROJECT" --timeout 600
          done
