name: web

# Path-filtered: only runs for web/package changes.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # next build runs type-checking; ESLint is ignored during build (next.config.mjs).
      # (`next lint` was removed in Next 16, so it's not used here.)
      - name: Build web
        run: pnpm --filter @credresearch/web build
