name: web

# Activates once apps/web is initialized (has its own package.json). Path-filtered
# so backend/worker-only changes never trigger a web build, and vice versa.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/web.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate API client from contract
        run: pnpm --filter @credresearch/api-client build
      - name: Lint + build web
        run: pnpm --filter @credresearch/web lint build
