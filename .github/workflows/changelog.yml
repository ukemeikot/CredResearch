name: changelog

# Enforces that every PR records a user-facing change. This is how CHANGELOG.md stays
# current up to main: a PR cannot merge without an entry (or an explicit 'no-changelog' label).
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  require-changelog:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-changelog') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Ensure CHANGELOG.md was updated
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated ✓"
          else
            echo "::error::CHANGELOG.md was not updated. Add an entry under [Unreleased], or label the PR 'no-changelog' for trivial changes."
            exit 1
          fi
