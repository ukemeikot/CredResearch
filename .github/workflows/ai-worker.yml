name: ai-worker

on:
  push:
    branches: [main]
    paths:
      - "services/ai-worker/**"
      - ".github/workflows/ai-worker.yml"
  pull_request:
    paths:
      - "services/ai-worker/**"
      - ".github/workflows/ai-worker.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest
